server {
    server_name api.bioleads.shop;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Security headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: SSL configuration (if handled by Nginx directly)
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/api.bioleads.shop/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.bioleads.shop/privkey.pem;
}

server {
    listen 80;
    server_name api.bioleads.shop;
    return 301 https://$host$request_uri;
}
